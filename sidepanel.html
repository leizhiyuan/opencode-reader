<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      color: #1a1a1a;
      font-size: 14px;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* status bar */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 12px;
      background: #fafafa;
      flex-shrink: 0;
    }

    #status-bar .left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #dc2626;
    }

    .status-dot.connected {
      background: #16a34a;
    }

    #status-text {
      color: #666;
    }

    #settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #888;
      padding: 2px 4px;
    }

    #settings-btn:hover {
      color: #333;
    }

    /* settings panel */
    #settings-panel {
      display: none;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
      flex-shrink: 0;
    }

    #settings-panel.open {
      display: block;
    }

    #settings-panel label {
      font-size: 12px;
      color: #666;
      display: block;
      margin-bottom: 6px;
    }

    #settings-panel .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #settings-panel input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      font-family: monospace;
    }

    #settings-panel input:focus {
      outline: none;
      border-color: #2563eb;
    }

    #settings-panel button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    #settings-panel button:hover {
      background: #1d4ed8;
    }

    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 6px;
    }

    .hint code {
      background: #f3f4f6;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }

    /* messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .msg {
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 8px;
    }

    .msg.user {
      background: #eff6ff;
      border-left: 3px solid #2563eb;
    }

    .msg.assistant {
      background: #f9fafb;
    }

    .msg .label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .msg .content {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .word {
      font-size: 18px;
      font-weight: 600;
      color: #2563eb;
    }

    .loading {
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .loading::before {
      content: "";
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ccc;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      color: #dc2626;
      background: #fef2f2;
      padding: 12px;
      border-radius: 6px;
    }

    .status {
      color: #888;
      padding: 12px;
      text-align: center;
    }

    .empty {
      color: #888;
      text-align: center;
      margin-top: 30%;
    }

    /* input area */
    #input-area {
      border-top: 1px solid #e5e7eb;
      padding: 12px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #input-area textarea {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      min-height: 38px;
      max-height: 120px;
    }

    #input-area textarea:focus {
      outline: none;
      border-color: #2563eb;
    }

    #input-area button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    #input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #input-area button:hover:not(:disabled) {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div id="status-bar">
    <div class="left">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">检查连接…</span>
    </div>
    <button id="settings-btn" title="设置">⚙</button>
  </div>
  <div id="settings-panel">
    <label>OpenCode 端口</label>
    <div class="row">
      <input type="number" id="port-input" placeholder="19877" />
      <button id="save-port-btn">保存</button>
    </div>
    <div class="hint">启动命令: <code id="start-cmd">opencode serve --port 19877</code></div>
  </div>
  <div id="messages">
    <div class="empty">选中文字 → 右键 → AI 解释<br>或在下方输入框直接提问</div>
  </div>
  <div id="input-area">
    <textarea id="user-input" placeholder="继续提问…" rows="1"></textarea>
    <button id="send-btn">发送</button>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
