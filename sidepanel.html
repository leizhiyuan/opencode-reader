<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      color: #1a1a1a;
      font-size: 14px;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .msg {
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 8px;
    }

    .msg.user {
      background: #eff6ff;
      border-left: 3px solid #2563eb;
    }

    .msg.assistant {
      background: #f9fafb;
    }

    .msg .label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .msg .content {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .word {
      font-size: 18px;
      font-weight: 600;
      color: #2563eb;
    }

    .loading {
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .loading::before {
      content: "";
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ccc;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      color: #dc2626;
      background: #fef2f2;
      padding: 12px;
      border-radius: 6px;
    }

    .status {
      color: #888;
      padding: 12px;
      text-align: center;
    }

    .empty {
      color: #888;
      text-align: center;
      margin-top: 40%;
    }

    #input-area {
      border-top: 1px solid #e5e7eb;
      padding: 12px;
      display: flex;
      gap: 8px;
    }

    #input-area textarea {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      min-height: 38px;
      max-height: 120px;
    }

    #input-area textarea:focus {
      outline: none;
      border-color: #2563eb;
    }

    #input-area button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    #input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #input-area button:hover:not(:disabled) {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div id="messages">
    <div class="empty">选中文字 → 右键 → Claude 解释<br>或在下方输入框直接提问</div>
  </div>
  <div id="input-area">
    <textarea id="user-input" placeholder="继续提问…" rows="1"></textarea>
    <button id="send-btn">发送</button>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
