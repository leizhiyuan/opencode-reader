<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      color: #1a1a1a;
      font-size: 14px;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* status bar */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 12px;
      background: #fafafa;
      flex-shrink: 0;
    }

    #status-bar .left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #dc2626;
    }

    .status-dot.connected {
      background: #16a34a;
    }

    #status-text {
      color: #666;
    }

    #settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #888;
      padding: 2px 4px;
      display: flex;
      align-items: center;
    }

    #settings-btn:hover {
      color: #333;
    }

    /* settings panel */
    #settings-panel {
      display: none;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
      flex-shrink: 0;
    }

    #settings-panel.open {
      display: block;
    }

    #settings-panel label {
      font-size: 12px;
      color: #666;
      display: block;
      margin-bottom: 6px;
    }

    #settings-panel .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #settings-panel input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      font-family: monospace;
    }

    #settings-panel input:focus {
      outline: none;
      border-color: #2563eb;
    }

    #settings-panel button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    #settings-panel button:hover {
      background: #1d4ed8;
    }

    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 6px;
    }

    .hint code {
      background: #f3f4f6;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }

    /* messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .msg {
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 8px;
    }

    .msg.user {
      background: #eff6ff;
      border-left: 3px solid #2563eb;
    }

    .msg.assistant {
      background: #f9fafb;
    }

    .msg .label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .msg .content {
      word-break: break-word;
    }

    .msg.user .content,
    .msg.assistant .content.streaming {
      white-space: pre-wrap;
    }

    /* markdown rendered content */
    .msg.assistant .content h1,
    .msg.assistant .content h2,
    .msg.assistant .content h3 {
      margin: 12px 0 6px;
      line-height: 1.3;
    }
    .msg.assistant .content h1 { font-size: 1.3em; }
    .msg.assistant .content h2 { font-size: 1.15em; }
    .msg.assistant .content h3 { font-size: 1.05em; }

    .msg.assistant .content p {
      margin: 6px 0;
    }

    .msg.assistant .content ul,
    .msg.assistant .content ol {
      margin: 6px 0;
      padding-left: 20px;
    }

    .msg.assistant .content li {
      margin: 2px 0;
    }

    .msg.assistant .content code {
      background: #f0f0f0;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.9em;
      font-family: 'SF Mono', Monaco, Menlo, monospace;
    }

    .msg.assistant .content pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.5;
    }

    .msg.assistant .content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      color: inherit;
      font-size: inherit;
    }

    .msg.assistant .content blockquote {
      border-left: 3px solid #d1d5db;
      padding-left: 12px;
      margin: 8px 0;
      color: #666;
    }

    .msg.assistant .content table {
      border-collapse: collapse;
      margin: 8px 0;
      width: 100%;
    }

    .msg.assistant .content th,
    .msg.assistant .content td {
      border: 1px solid #d1d5db;
      padding: 6px 10px;
      text-align: left;
      font-size: 13px;
    }

    .msg.assistant .content th {
      background: #f3f4f6;
      font-weight: 600;
    }

    .msg.assistant .content hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 12px 0;
    }

    .msg.assistant .content a {
      color: #2563eb;
      text-decoration: none;
    }

    .msg.assistant .content a:hover {
      text-decoration: underline;
    }

    .msg.assistant .content > *:first-child {
      margin-top: 0;
    }

    .msg.assistant .content > *:last-child {
      margin-bottom: 0;
    }

    .word {
      font-size: 18px;
      font-weight: 600;
      color: #2563eb;
    }

    .loading {
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .loading::before {
      content: "";
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ccc;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      color: #dc2626;
      background: #fef2f2;
      padding: 12px;
      border-radius: 6px;
    }

    .status {
      color: #888;
      padding: 12px;
      text-align: center;
    }

    .empty {
      color: #888;
      text-align: center;
      margin-top: 30%;
    }

    /* input area */
    #input-area {
      border-top: 1px solid #e5e7eb;
      padding: 12px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #input-area textarea {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      min-height: 38px;
      max-height: 120px;
    }

    #input-area textarea:focus {
      outline: none;
      border-color: #2563eb;
    }

    #input-area button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    #input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #input-area button:hover:not(:disabled) {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div id="status-bar">
    <div class="left">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">检查连接…</span>
    </div>
    <button id="settings-btn" title="设置"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </div>
  <div id="settings-panel">
    <label>OpenCode 端口</label>
    <div class="row">
      <input type="number" id="port-input" placeholder="19877" />
      <button id="save-port-btn">保存</button>
    </div>
    <div class="hint">启动命令: <code id="start-cmd">opencode serve --port 19877</code></div>
  </div>
  <div id="messages">
    <div class="empty">选中文字 → 右键 → AI 解释<br>或在下方输入框直接提问</div>
  </div>
  <div id="input-area">
    <textarea id="user-input" placeholder="继续提问…" rows="1"></textarea>
    <button id="send-btn">发送</button>
  </div>
  <script src="lib/marked.min.js"></script>
  <script src="lib/purify.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
